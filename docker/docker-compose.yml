name: prism

services:
  gateway:
    profiles: ["dev", "staging", "prod"]
    build:
      context: ..
      dockerfile: docker/gateway.Dockerfile
    env_file:
      - ../.env
    environment:
      PRISM_PROVIDER: mock
      PRISM_AUDIT_DB: /data/audit.sqlite3
      PRISM_API_KEYS: ${PRISM_API_KEYS:-tenant_dev:dev}
      PRISM_SESSION_SECRET: ${PRISM_SESSION_SECRET:-replace-this-development-secret}
    ports:
      - "8004:8004"
    volumes:
      - prism-audit:/data
    depends_on:
      - redis

  web:
    profiles: ["dev", "staging", "prod"]
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    environment:
      VITE_PRISM_API_URL: http://127.0.0.1:8004
    ports:
      - "3004:3004"
    depends_on:
      - gateway

  redis:
    profiles: ["dev", "staging", "prod"]
    image: redis:7-alpine
    expose:
      - "6379"

volumes:
  prism-audit:



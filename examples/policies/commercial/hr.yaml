domain: hr
version: "1"
rules:
  - rule_id: hr_employee
    entity_type: person
    action: tokenize
    token_prefix: EMPLOYEE
    token_strategy: session_stable
    rehydrate_roles: [hr_admin]
  - rule_id: hr_email
    entity_type: email
    action: mask
  - rule_id: hr_phone
    entity_type: phone
    action: redact
